# Matches GitHub docs: configure-pages → upload artifact → deploy (separate job).
# https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site#publishing-with-a-custom-github-actions-workflow
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate (same checks as CI)
        run: |
          test -f index.html
          test -f css/style.css
          test -f js/app.js
          test -f data/scimago.json
          test -f data/core.json
          python3 -c "import json; json.load(open('data/scimago.json')); json.load(open('data/core.json')); print('JSON OK')"
          python3 -m py_compile scripts/build_scimago.py scripts/build_core.py

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r css js data _site/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
