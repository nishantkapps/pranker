# Single job = exactly one github-pages artifact per run (fixes duplicate-artifact deploy errors)
# Repo: Settings → Pages → Source: GitHub Actions
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate (same checks as CI)
        run: |
          test -f index.html
          test -f css/style.css
          test -f js/app.js
          test -f data/scimago.json
          test -f data/core.json
          python3 -c "import json; json.load(open('data/scimago.json')); json.load(open('data/core.json')); print('JSON OK')"
          python3 -m py_compile scripts/build_scimago.py scripts/build_core.py

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r css js data _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
