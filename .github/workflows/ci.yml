# Validation on every PR and push (no Pages artifact)
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate site & data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required files exist
        run: |
          test -f index.html
          test -f css/style.css
          test -f js/app.js
          test -f data/scimago.json
          test -f data/core.json

      - name: Parse ranking JSON
        run: |
          python3 -c "import json; json.load(open('data/scimago.json')); json.load(open('data/core.json')); print('JSON OK')"

      - name: Python build scripts (syntax)
        run: python3 -m py_compile scripts/build_scimago.py scripts/build_core.py
